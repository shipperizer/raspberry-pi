apiVersion: skaffold/v2beta26
kind: Config
profiles:
- name: istio
  deploy:
    kustomize:
      paths:
      - istio/
- name: istio-config
  deploy:
    kubectl:
      manifests:
      - istio/ingress_class.yaml
      - istio/cluster_issuer.yaml
      - istio/certificate.yaml
      - istio/gateway.yaml
- name: cert-manager
  deploy:
    kubectl:
      manifests:
      - https://github.com/cert-manager/cert-manager/releases/download/v1.15.1/cert-manager.yaml
      - cert-manager/cluster_issuer.yaml
- name: contour
  deploy:
    kustomize:
      paths:
      - contour/
- name: argocd
  deploy:
    kubectl:
      manifests:
      - argocd/namespace.yaml
      - argocd/argocd.yaml
      defaultNamespace: argocd
    kustomize:
      paths:
      - argocd/image-updater
      defaultNamespace: argocd
- name: argo
  deploy:
    kubectl:
      manifests:
      - https://raw.githubusercontent.com/argoproj/argo-workflows/master/manifests/quick-start-postgres.yaml
- name: argo-dataflow
  deploy:
    kubectl:
      manifests:
      - https://raw.githubusercontent.com/argoproj-labs/argo-dataflow/main/config/quick-start.yaml
      - https://raw.githubusercontent.com/argoproj-labs/argo-dataflow/main/config/apps/argo-server.yaml
      defaultNamespace: argo-dataflow-system
- name: smallstep-ca
  deploy:
    helm:
      releases:
      - name: step-certificates
        remoteChart: smallstep/step-certificates
        valuesFiles:
        - smallstep/step-ca.yaml
        namespace: ca
        createNamespace: true
      - name: step-issuer
        remoteChart: smallstep/step-issuer
        namespace: ca
        createNamespace: true
        valuesFiles:
        - smallstep/step-issuer.yaml
    kubectl:
      manifests:
      - smallstep/networking.yaml
- name: loki
  deploy:
    helm:
      releases:
      - name: loki
        remoteChart: grafana/loki
        upgradeOnChange: true
        namespace: kube-public
      - name: promtail
        remoteChart: grafana/promtail
        upgradeOnChange: true
        namespace: kube-public