cluster:
  name: bomber
kubeProxyReplacement: true
operator:
  replicas: 1
routingMode: tunnel
tunnelProtocol: vxlan
ingressController:
  enabled: false
l7Proxy: true  
l2announcements:
    enabled: true
gatewayAPI:
    enabled: true 
    hostNetwork:
        enabled: false
k8sServiceHost: 127.0.0.1
k8sServicePort: 6443
socketLB:
    enabled: true
# Observability
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true