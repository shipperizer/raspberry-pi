apiVersion: "cilium.io/v2"
kind: CiliumLoadBalancerIPPool
metadata:
  name: "gateway-ip-pool"
  namespace: kube-system
spec:
  blocks:
    - start: "192.168.86.30"
      stop: "192.168.86.35"
---
apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: "gateway-l2-policy"
  namespace: kube-system
spec:
  serviceSelector:
    matchExpressions:
      - key: "io.kubernetes.service.type"
        operator: In
        values: ["LoadBalancer"]
  nodeSelector:
    matchExpressions:
      - key: "kubernetes.io/os"
        operator: In
        values: ["linux"]
  interfaces:
    - ^end[0-9]+
  externalIPs: true
  loadBalancerIPs: true
